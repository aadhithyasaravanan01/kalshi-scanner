name: scan
# Runs the scanners on a schedule with no machine of your own. The Discord
# webhook is injected from the repo secret DISCORD_WEBHOOK_URL (never in code).
on:
  schedule:
    - cron: '*/5 * * * *'    # every 5 min (GitHub's floor; often delayed under load)
  workflow_dispatch: {}       # lets you run it manually from the Actions tab

permissions:
  contents: write             # to commit results.json + state/seen.json

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No setup-python needed: the runner ships Python 3 and our code is pure
      # stdlib. (Fewer actions = fewer deprecation warnings, faster runs.)
      - name: Run scanners
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python3 run_scans.py
      - name: Commit results + alert state
        # Never fail the workflow over a harmless push race: another run (or a
        # dev push) may advance origin between our commit and push. Rebase and
        # retry; if it still can't push, the next run catches up.
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json state/seen.json 2>/dev/null || true
          git commit -m "scan @ $(date -u +%FT%TZ)" || { echo "no changes"; exit 0; }
          for i in 1 2 3; do
            git pull --rebase origin main || true
            git push origin main && exit 0
            echo "push race, retry $i"; sleep 3
          done
          echo "push deferred to next run"; exit 0
