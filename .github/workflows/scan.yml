name: scan
# Runs the scanners on a schedule with no machine of your own. The Discord
# webhook is injected from the repo secret DISCORD_WEBHOOK_URL (never in code).
on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 min (GitHub's practical floor is ~5 min)
  workflow_dispatch: {}       # lets you run it manually from the Actions tab

permissions:
  contents: write             # to commit results.json + state/seen.json

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run scanners
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python run_scans.py
      - name: Commit results + alert state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json state/seen.json 2>/dev/null || true
          git commit -m "scan @ $(date -u +%FT%TZ)" || { echo "no changes"; exit 0; }
          git push
